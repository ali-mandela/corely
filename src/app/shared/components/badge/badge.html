<span
  class="inline-flex items-center gap-1 px-2 py-0.5 rounded-sm border text-[10px] font-bold uppercase tracking-tighter"
  [ngClass]="{
    'bg-emerald-50 text-emerald-700 border-emerald-100': variant === 'success',
    'bg-amber-50 text-amber-700 border-amber-100': variant === 'warning',
    'bg-red-50 text-red-700 border-red-100': variant === 'danger',
    'bg-blue-50 text-blue-700 border-blue-100': variant === 'info',
    'bg-slate-50 text-slate-600 border-slate-200': variant === 'neutral',
  }"
>
  <ng-content></ng-content>
</span>
