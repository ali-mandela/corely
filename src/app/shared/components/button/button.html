<button
  [type]="type"
  [disabled]="disabled || loading"
  (click)="onClick()"
  class="inline-flex items-center justify-center gap-1.5 font-bold rounded-sm transition-all duration-200 active:translate-y-[0.5px] disabled:opacity-40 disabled:cursor-not-allowed disabled:active:translate-y-0"
  [ngClass]="{
    'px-3 py-1.5 text-[11px]': size === 'md',
    'px-2 py-1 text-[10px]': size === 'sm',
    'bg-[#0f172a] !text-white hover:bg-slate-800 shadow-sm': variant === 'primary',
    'border border-slate-200 text-slate-600 bg-white hover:bg-slate-50': variant === 'secondary',
    'text-slate-500 hover:text-slate-700 hover:bg-slate-50': variant === 'ghost',
    'bg-red-600 text-white hover:bg-red-700 shadow-sm': variant === 'danger',
  }"
>
  <lucide-icon *ngIf="icon && !loading" [name]="icon" class="w-3.5 h-3.5"></lucide-icon>
  <svg
    *ngIf="loading"
    class="animate-spin w-3.5 h-3.5"
    xmlns="http://www.w3.org/2000/svg"
    fill="none"
    viewBox="0 0 24 24"
  >
    <circle
      class="opacity-25"
      cx="12"
      cy="12"
      r="10"
      stroke="currentColor"
      stroke-width="4"
    ></circle>
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
  </svg>
  <ng-content></ng-content>
</button>
