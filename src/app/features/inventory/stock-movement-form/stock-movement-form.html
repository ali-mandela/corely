<div class="p-6 space-y-4 animate-in">
  <div class="flex items-center gap-3">
    <a
      routerLink="/inventory"
      class="p-1.5 rounded-sm border border-slate-200 hover:bg-slate-50 transition-all text-slate-400 hover:text-slate-600"
      ><lucide-icon [name]="ArrowLeft" class="w-4 h-4"></lucide-icon
    ></a>
    <div>
      <h1 class="text-lg font-bold text-slate-900">Record Stock Movement</h1>
      <p class="text-[11px] text-slate-400 mt-0.5">Log stock in, out, adjustments, or transfers.</p>
    </div>
  </div>

  <form (ngSubmit)="onSubmit()" class="space-y-4">
    <!-- Item Picker -->
    <div class="bg-white border border-slate-200 rounded-sm p-5 space-y-4">
      <div
        class="text-[10px] font-bold uppercase tracking-wider text-slate-400 border-b border-slate-100 pb-2"
      >
        Select Item
      </div>

      <div *ngIf="!selectedItem()" class="relative">
        <div
          class="flex items-center gap-2 px-3 py-2 bg-slate-50 border border-slate-200 rounded-sm"
        >
          <lucide-icon [name]="Search" class="w-3.5 h-3.5 text-slate-400"></lucide-icon>
          <input
            type="text"
            [(ngModel)]="itemSearch"
            (input)="onItemSearch()"
            (focus)="onItemSearch()"
            name="item_search"
            placeholder="Search by product name or SKU..."
            class="flex-1 bg-transparent text-[12px] text-slate-700 outline-none placeholder:text-slate-300"
          />
        </div>
        <div
          *ngIf="showDropdown() && filteredItems().length > 0"
          class="absolute top-full left-0 right-0 mt-1 bg-white border border-slate-200 rounded-sm shadow-lg z-20 max-h-48 overflow-y-auto"
        >
          <button
            *ngFor="let item of filteredItems()"
            (click)="selectItem(item)"
            type="button"
            class="w-full px-3 py-2 text-left hover:bg-indigo-50 transition-colors border-b border-slate-50 last:border-0"
          >
            <div class="text-[12px] font-semibold text-slate-800">{{ item.name }}</div>
            <div class="text-[10px] text-slate-400">
              {{ item.sku || '—' }} · {{ item.unit || 'pcs' }}
            </div>
          </button>
        </div>
        <div
          *ngIf="showDropdown() && filteredItems().length === 0 && itemSearch.length > 0"
          class="absolute top-full left-0 right-0 mt-1 bg-white border border-slate-200 rounded-sm shadow-lg z-20 p-3 text-center text-[11px] text-slate-400"
        >
          No items found.
        </div>
      </div>

      <div
        *ngIf="selectedItem()"
        class="flex items-center justify-between bg-indigo-50 border border-indigo-200 rounded-sm px-4 py-3"
      >
        <div>
          <div class="text-[13px] font-bold text-indigo-800">{{ selectedItem()!.name }}</div>
          <div class="text-[10px] text-indigo-500">
            SKU: {{ selectedItem()!.sku || '—' }} · Unit: {{ form.unit }}
          </div>
        </div>
        <button
          type="button"
          (click)="clearItem()"
          class="text-[11px] text-indigo-600 font-bold hover:text-indigo-800 transition-colors"
        >
          Change
        </button>
      </div>
    </div>

    <!-- Movement Details -->
    <div class="bg-white border border-slate-200 rounded-sm p-5 space-y-4">
      <div
        class="text-[10px] font-bold uppercase tracking-wider text-slate-400 border-b border-slate-100 pb-2"
      >
        Movement Details
      </div>
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <app-select
          label="Movement Type"
          [(ngModel)]="form.movement_type"
          name="movement_type"
          [options]="movementTypes"
        ></app-select>
        <app-input
          label="Quantity"
          placeholder="10"
          [(ngModel)]="form.quantity"
          name="quantity"
          type="number"
          [required]="true"
        ></app-input>
        <app-input
          label="Unit"
          placeholder="pcs / kg / bags"
          [(ngModel)]="form.unit"
          name="unit"
        ></app-input>
        <app-input
          label="Unit Cost (₹)"
          placeholder="Cost per unit"
          [(ngModel)]="form.unit_cost"
          name="unit_cost"
          type="number"
        ></app-input>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <app-input
          label="From Location"
          placeholder="Source"
          [(ngModel)]="form.from_location"
          name="from_location"
        ></app-input>
        <app-input
          label="To Location"
          placeholder="Destination"
          [(ngModel)]="form.to_location"
          name="to_location"
        ></app-input>
        <app-input
          label="Batch Number"
          placeholder="Batch / lot"
          [(ngModel)]="form.batch_number"
          name="batch_number"
        ></app-input>
      </div>
    </div>

    <!-- Reference & Reason -->
    <div class="bg-white border border-slate-200 rounded-sm p-5 space-y-4">
      <div
        class="text-[10px] font-bold uppercase tracking-wider text-slate-400 border-b border-slate-100 pb-2"
      >
        Reference & Reason
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <app-input
          label="Reference Type"
          placeholder="purchase / sale / transfer"
          [(ngModel)]="form.reference_type"
          name="ref_type"
        ></app-input>
        <app-input
          label="Reference ID"
          placeholder="Document ID"
          [(ngModel)]="form.reference_id"
          name="ref_id"
        ></app-input>
        <app-select
          label="Reason"
          [(ngModel)]="form.reason"
          name="reason"
          [options]="reasonOptions"
        ></app-select>
      </div>
      <app-textarea
        label="Notes"
        placeholder="Additional notes..."
        [(ngModel)]="form.notes"
        name="notes"
        [rows]="2"
      ></app-textarea>
    </div>

    <div class="flex items-center gap-3">
      <app-button type="submit" variant="primary" [loading]="saving" [icon]="Save"
        >Record Movement</app-button
      >
      <a routerLink="/inventory"
        ><app-button variant="secondary" type="button">Cancel</app-button></a
      >
    </div>
  </form>
</div>
