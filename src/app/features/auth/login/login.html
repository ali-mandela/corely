<div class="min-h-screen bg-[#f8fafc] flex items-center justify-center font-['Inter'] antialiased">
  <div class="w-full max-w-sm animate-in">
    <!-- Logo -->
    <div class="flex items-center justify-center gap-3 mb-8">
      <div
        class="w-9 h-9 bg-[#0f172a] rounded-sm flex items-center justify-center text-white shadow-lg"
      >
        <lucide-icon [name]="Layers" class="w-5 h-5"></lucide-icon>
      </div>
      <span class="text-xl font-bold text-[#0f172a] tracking-tight">Corely ERP</span>
    </div>

    <!-- Login Card -->
    <div class="bg-white border border-slate-200 rounded-sm p-6 shadow-sm">
      <div class="mb-6">
        <h1 class="text-lg font-bold text-slate-900">Sign in</h1>
        <p class="text-[12px] text-slate-400 mt-0.5">
          Enter your credentials to access the system.
        </p>
      </div>

      <!-- Error -->
      <div
        *ngIf="error"
        class="mb-4 px-3 py-2 bg-red-50 border border-red-100 rounded-sm text-[11px] font-medium text-red-600"
      >
        {{ error }}
      </div>

      <form (ngSubmit)="onSubmit()" class="space-y-4">
        <app-input
          label="Organization"
          placeholder="e.g. acme-corp"
          [(ngModel)]="slug"
          name="slug"
          [required]="true"
          hint="Your organization slug"
        ></app-input>

        <app-input
          label="Email or Phone"
          placeholder="admin@acme.com"
          [(ngModel)]="identifier"
          name="identifier"
          type="email"
          [required]="true"
        ></app-input>

        <app-input
          label="Password"
          placeholder="••••••••"
          [(ngModel)]="password"
          name="password"
          type="password"
          [required]="true"
        ></app-input>

        <app-button variant="primary" type="submit" [loading]="loading" class="w-full">
          Sign In
        </app-button>
      </form>
    </div>

    <p class="text-center text-[10px] text-slate-400 mt-4">Corely Enterprise System v1.0</p>
  </div>
</div>
